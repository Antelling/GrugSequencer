<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Step Sequencer</title>
  </head>
  <body>
    <div id="controls">
      <button type="button" id="project-btn" class="ctrl-btn project-btn" title="Manage projects">📁 <span id="project-name">New Project</span></button>
      <button type="button" id="play-btn" class="ctrl-btn">▶</button>
      <div class="bpm-group">
        <label for="bpm-slider">BPM</label>
        <input id="bpm-slider" type="range" min="1" max="300" value="120" />
        <span id="bpm-display">120</span>
      </div>
      <div class="btn-group">
        <button type="button" id="add-stanza-btn" class="ctrl-btn" title="Add 4 steps">+Stanza</button>
        <button type="button" id="add-track-btn" class="ctrl-btn" title="Add instrument">+Inst</button>
      </div>
    </div>
    <div id="main-layout">
      <canvas id="canvas"></canvas>
    </div>
    <aside id="bottom-panel">
      <div id="panel-handle"></div>
      <div id="panel-content"></div>
    </aside>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
